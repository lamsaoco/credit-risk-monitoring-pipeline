version: '3.8'

x-airflow-common: &airflow-common
  build:
    context: .. # d:/DE-Project/ — contains both docker/ and credit-risk-monitoring-pipeline/
    dockerfile: docker/Dockerfile
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB}
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
  volumes:
    - ../airflow/dags:/opt/airflow/dags
    - ../airflow/logs:/opt/airflow/logs
    - ../airflow/plugins:/opt/airflow/plugins
    - ../dbt:/opt/airflow/dbt
    - ../docker:/opt/airflow/docker
    - /var/run/docker.sock:/var/run/docker.sock
  depends_on:
    postgres:
      condition: service_healthy
    airflow-setup:
      condition: service_completed_successfully
  restart: unless-stopped

services:
  airflow-setup:
    image: debian:bookworm-slim
    user: "0:0"
    volumes:
      - ..:/project
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -c "chmod 666 /var/run/docker.sock && mkdir -p /project/airflow/dags /project/airflow/logs /project/airflow/plugins && chmod -R 777 /project/airflow/dags /project/airflow/logs /project/airflow/plugins"

  postgres:
    image: postgres:15
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}" ]
      interval: 5s
      retries: 10
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@pgadmin.org}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres
      - postgres-dw
    restart: unless-stopped

  # ── Data Warehouse PostgreSQL (separate from Airflow metadata) ──
  postgres-dw:
    image: postgres:15
    env_file: .env
    environment:
      POSTGRES_USER: ${DW_POSTGRES_USER}
      POSTGRES_PASSWORD: ${DW_POSTGRES_PASSWORD}
      POSTGRES_DB: ${DW_POSTGRES_DB:-credit_risk_dw}
    ports:
      - "5433:5432"
    volumes:
      - dw_postgres_data:/var/lib/postgresql/data
      # DDL: auto-creates credit_risk schema & stg_loans table on first start
      - ../warehouse/postgres/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${DW_POSTGRES_USER}", "-d", "${DW_POSTGRES_DB:-credit_risk_dw}" ]
      interval: 5s
      retries: 10
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    command:
      - bash
      - -c
      - |
        airflow db upgrade && \
        airflow users create \
          --username "$${AIRFLOW_WWW_USER_USERNAME}" \
          --password "$${AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email "$${AIRFLOW__SMTP__SMTP_USER}"
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    command: airflow webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: [ "CMD", "curl", "--fail", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: airflow scheduler
    healthcheck:
      test: [ "CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--limit", "1" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Standalone dbt ──
  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.9.0
    env_file: .env
    environment:
      # Tell dbt where to find profiles.yml (same folder as the project)
      DBT_PROFILES_DIR: /usr/app/dbt
    volumes:
      # Use HOST_PROJECT_ROOT so Docker daemon on the host can resolve the path correctly (DooD pattern)
      - ${HOST_PROJECT_ROOT}/dbt:/usr/app/dbt
    working_dir: /usr/app/dbt
    entrypoint: [ "dbt" ]
    command: [ "debug" ] # Default command to avoid just printing help
    depends_on:
      postgres-dw:
        condition: service_healthy

  # ── dbt Documentation UI ──
  dbt-docs:
    image: ghcr.io/dbt-labs/dbt-postgres:1.9.0
    env_file: .env
    environment:
      DBT_PROFILES_DIR: /usr/app/dbt
    volumes:
      - ${HOST_PROJECT_ROOT}/dbt:/usr/app/dbt
    working_dir: /usr/app/dbt
    ports:
      - "8081:8080"
    restart: unless-stopped
    entrypoint:
      - sh
      - -c
      - "dbt docs generate && dbt docs serve --host 0.0.0.0 --port 8080"
    depends_on:
      - dbt

volumes:
  postgres_data:
  dw_postgres_data:


version: 2

sources:
  - name: credit_risk_source
    # Resolve database and schema from the active dbt target automatically:
    #   --target dev        → database=credit_risk_dw,  schema=credit_risk
    #   --target snowflake  → database=CREDIT_RISK_DW,  schema=STG
    # No env var or code change needed when switching backends.
    database: "{{ target.database }}"
    schema: "{{ target.schema }}"
    tables:
      - name: stg_loans
        description: "Raw staging table for HMDA loan data enriched with FRED interest rates."
        columns:
          - name: data_year
            tests:
              - not_null

          - name: state_code
            description: >
              2-char US state FIPS code (e.g. 'CA', 'TX').
              All originated loans (action_taken=1) must have a valid state_code.
              NULL here indicates a pipeline bug (e.g. Spark partitionBy stripping the column).
            tests:
              - not_null
